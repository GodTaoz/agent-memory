# Docker Compose for Memory MCP Server
version: '3.8'

services:
  memory-mcp:
    build: .
    ports:
      - "5678:5678"
    volumes:
      - ./config:/app/config:ro
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=5678
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - memory-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - memory-net

volumes:
  redis-data:

networks:
  memory-net:
    driver: bridge
