name: ci

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  test-and-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install project with dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[all]'

      - name: Run tests
        run: pytest -q

      - name: Check runnable-surface formatting
        run: black --check src/memory_mcp/main.py src/memory_mcp/mcp_runtime.py tests/test_mcp_runtime.py examples

      - name: Check runnable-surface flake8
        run: flake8 src/memory_mcp/main.py src/memory_mcp/mcp_runtime.py tests/test_mcp_runtime.py examples

      - name: Check runnable-surface typing
        run: mypy src/memory_mcp/main.py src/memory_mcp/mcp_runtime.py
